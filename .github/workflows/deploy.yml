# Déploiement GitHub Pages via la branche gh-pages (évite configure-pages /
# deploy-pages qui exigent souvent une activation manuelle + droits « Pages » API).
#
# Une fois configuré dans Settings → Pages (source : branche gh-pages),
# chaque push sur main met à jour le site.

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deployment
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publier sur la branche gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          # Ne pas exposer les workflows dans le dossier publié
          exclude_assets: ".github"
          force_orphan: true
          commit_message: "deploy: ${{ github.sha }}"
