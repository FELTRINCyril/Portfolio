# Déploiement GitHub Pages via l’API officielle (source : GitHub Actions dans
# Settings → Pages). Compatible avec le jeton du workflow (pas de push sur gh-pages).

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Préparer le dossier publié
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            ./ _site/

      - name: Configurer Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Téléverser l’artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Déployer
        id: deployment
        uses: actions/deploy-pages@v4
